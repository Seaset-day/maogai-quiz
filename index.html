<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>毛概题库 · 练习</title>
<style>
:root{--red:#c1272d;--red-d:#8f1d22;--bg:#f3f1ee;--card:#fff;--ok:#1a9e5f;--no:#e0533d;--mid:#f5a623;--line:#e7e3dd;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:var(--bg);color:#222}
header{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,var(--red),var(--red-d));color:#fff;padding:12px 16px;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.htop{display:flex;align-items:center;justify-content:space-between}.htop h1{font-size:17px;margin:0;font-weight:700}
.prog{font-size:12px;opacity:.95;text-align:right;line-height:1.4}
.bar{height:5px;background:rgba(255,255,255,.3);border-radius:3px;margin-top:8px;overflow:hidden}
.bar>i{display:block;height:100%;background:#ffe08a;width:0;transition:.3s}
.modesw{display:flex;gap:8px;margin-top:10px}
.mchip{flex:1;text-align:center;font-size:13px;padding:6px 0;border-radius:14px;background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.35);cursor:pointer}
.mchip.on{background:#fff;color:var(--red-d);font-weight:700}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.chip{font-size:12.5px;padding:4px 11px;border-radius:14px;background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.35);cursor:pointer;user-select:none}
.chip.on{background:#fff;color:var(--red-d);font-weight:700}
.wrap{max-width:760px;margin:0 auto;padding:14px}
.card{background:var(--card);border-radius:12px;padding:18px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.pstat{font-size:12.5px;color:#8f1d22;background:#fdeeee;border:1px solid #f3cfcf;border-radius:8px;padding:8px 11px;margin-bottom:12px;line-height:1.7}.pstat b{color:#c0392b}
.qhead{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.tag{font-size:12px;padding:2px 9px;border-radius:6px;font-weight:700}
.t-单选{background:#fdeaea;color:#c0392b}.t-多选{background:#fff1e0;color:#b9690f}.t-判断{background:#e7f7ee;color:#147a4e}.t-大题{background:#eae6fb;color:#5b3fb0}
.lv{font-size:11px;padding:2px 7px;border-radius:6px;background:#eef1f5;color:#888;font-weight:700}
.chaplbl{font-size:12px;color:#a59b8e;margin-left:auto}.qno{font-size:13px;color:#b0a89c;font-weight:700}
.qtext{font-size:16.5px;line-height:1.75;font-weight:700;margin:2px 0 14px}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;gap:10px;align-items:flex-start;border:1.5px solid var(--line);border-radius:10px;padding:11px 13px;cursor:pointer;font-size:15px;line-height:1.55;background:#fbfaf8}
.opt .lt{flex:0 0 22px;height:22px;border-radius:50%;background:#efece7;color:#776;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin-top:1px}
.opt.sel{border-color:var(--red);background:#fdeeee}.opt.sel .lt{background:var(--red);color:#fff}
.opt.right{border-color:var(--ok);background:#e9f9f1}.opt.right .lt{background:var(--ok);color:#fff}
.opt.wrong{border-color:var(--no);background:#fdecea}.opt.wrong .lt{background:var(--no);color:#fff}
.opt.dis{cursor:default}
textarea{width:100%;min-height:110px;border:1px solid var(--line);border-radius:8px;padding:11px;font-size:14.5px;font-family:inherit;resize:vertical;line-height:1.6}
textarea:focus{outline:none;border-color:var(--red)}
.btns{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
button{font-family:inherit;font-size:14.5px;border:none;border-radius:8px;padding:10px 16px;cursor:pointer}
.primary{background:var(--red);color:#fff;flex:1;min-width:120px}.primary:active{background:var(--red-d)}
.primary:disabled{opacity:.45}.ghost{background:#efece7;color:#555}
.fb{margin-top:13px;border-radius:8px;padding:11px 13px;font-size:14px;font-weight:700;display:none}
.fb.show{display:block}.fb.ok{background:#e9f9f1;color:#147a4e;border:1px solid #b6e6cd}
.fb.bad{background:#fdecea;color:#b2382a;border:1px solid #f3c0b8}
.ansbox{margin-top:13px;border-top:1px dashed var(--line);padding-top:13px;display:none}.ansbox.show{display:block}
.ansbox h4{margin:0 0 8px;color:var(--ok);font-size:14px}.ansbox p{margin:0 0 8px;font-size:14.5px;line-height:1.8;color:#2c3e50}
.rate{display:flex;gap:10px;margin-top:14px}.rate button{flex:1;font-size:14px;padding:10px;border:1.5px solid transparent;background:#f5f2ee}
.rate .r0{color:var(--ok)}.rate .r2{color:var(--no)}
.nav{display:flex;gap:10px;margin-top:14px}.nav button{flex:1;background:#fff;border:1px solid var(--line);color:#555}.nav button:disabled{opacity:.4}
.sheet{background:var(--card);border-radius:12px;margin-top:14px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,.06)}.sheet h3{margin:0 0 4px;font-size:14px}
.legend{font-size:11.5px;color:#a59b8e;margin-bottom:10px;line-height:1.7}.legend b{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:middle;margin:0 3px 0 8px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(34px,1fr));gap:6px}
.cell{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;background:#efece7;color:#666;cursor:pointer;border:2px solid transparent;position:relative}
.cell.cur{border-color:var(--red);font-weight:700}
.cell.s0{background:#d9f4e8;color:#147a4e}.cell.s2{background:#fbd9d2;color:#b2382a}
.cell .dot{position:absolute;top:1px;right:2px;width:5px;height:5px;border-radius:50%;background:var(--no)}
.qchips{display:flex;flex-wrap:wrap;gap:6px}
.qchip{font-size:11.5px;padding:3px 9px;border-radius:12px;background:#efece7;color:#666;border:1px solid var(--line)}
.qchip.cur{background:var(--red);color:#fff;border-color:var(--red);font-weight:700}.qchip.lv1{background:#fef6e7;color:#9a6a06;border-color:#f0d77a}
.done-card{text-align:center;padding:34px 16px}.done-card .big{font-size:44px}.done-card h2{margin:10px 0 6px;color:var(--ok)}
.foot{text-align:center;color:#b0a89c;font-size:11.5px;padding:16px}.reset{color:#c0392b;cursor:pointer;text-decoration:underline}
.hint{font-size:12px;color:#9a6a06;font-weight:700;margin-left:6px}
.kbd{font-size:11px;color:#b0a89c;margin-top:8px;text-align:center}
.expbtn{font-size:12.5px;padding:5px 12px;border-radius:14px;background:rgba(255,255,255,.92);color:var(--red-d);border:none;font-weight:700;cursor:pointer;white-space:nowrap}
.expbtn:active{background:#fff}
.ov{position:fixed;inset:0;z-index:50;background:rgba(20,10,10,.55);display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.ov.show{display:flex}
.ovcard{background:#fff;border-radius:14px;padding:24px 26px;width:300px;max-width:88vw;box-shadow:0 8px 30px rgba(0,0,0,.3);text-align:center}
.ovcard h3{margin:0 0 4px;font-size:16px;color:var(--red-d)}
.ovsub{font-size:12.5px;color:#888;margin-bottom:16px;min-height:18px}
.ovbar{height:10px;background:#efece7;border-radius:6px;overflow:hidden}
.ovbar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--red),#f5a623);transition:width .15s}
.ovpct{font-size:22px;font-weight:800;color:var(--red);margin:12px 0 2px}
.ovdone{font-size:13px;color:var(--ok);font-weight:700}
.ovicon{font-size:34px;margin-bottom:6px}
</style></head><body>
<header>
  <div class="htop"><h1>毛概题库</h1><div style="display:flex;align-items:center;gap:10px"><button class="expbtn" id="expBtn">📄 导出Word</button><div class="prog" id="prog"></div></div></div>
  <div class="bar"><i id="barfill"></i></div>
  <div class="modesw" id="modesw">
    <span class="mchip on" data-m="练习">🔁 刷题练习</span>
    <span class="mchip" data-m="浏览">📖 顺序浏览</span>
  </div>
  <div class="filters" id="typefil">
    <span class="chip on" data-f="全部">全部</span>
    <span class="chip" data-f="单选">单选</span>
    <span class="chip" data-f="多选">多选</span>
    <span class="chip" data-f="判断">判断</span>
    <span class="chip" data-f="大题">论述</span>
    <span class="chip" data-k="1" style="margin-left:auto">🔁 只看错题</span>
  </div>
</header>
<div class="ov" id="ov"><div class="ovcard">
  <div class="ovicon" id="ovicon">📄</div>
  <h3 id="ovtitle">正在生成 Word…</h3>
  <div class="ovsub" id="ovsub">准备中…</div>
  <div class="ovbar"><i id="ovfill"></i></div>
  <div class="ovpct" id="ovpct">0%</div>
</div></div>
<div class="wrap">
  <div class="card">
    <div class="pstat" id="pstat" style="display:none"></div>
    <div class="qhead" id="qhead"></div>
    <div class="qtext" id="qtext"></div>
    <div class="opts" id="opts"></div>
    <textarea id="ta" style="display:none" placeholder="在此作答（论述题可只在脑中作答，再点“查看参考答案”对照）…"></textarea>
    <div class="fb" id="fb"></div>
    <div class="btns" id="btns"></div>
    <div class="ansbox" id="ansbox"><h4>✔ 参考答案</h4><div id="ansbody"></div></div>
    <div class="rate" id="rate"></div>
    <div class="nav" id="nav"><button id="prevBtn">← 上一题</button><button id="nextBtn">下一题 →</button></div>
    <div class="kbd" id="kbd"></div>
  </div>
  <div class="sheet" id="psheet" style="display:none">
    <h3>练习队列</h3>
    <div class="legend">规则：<b style="background:none;width:auto;color:#147a4e">连续答对 2 次</b>即“掌握”移出队列；答错 → 等级清零、隔 2~3 题就重现并进错题本；答对但未掌握 → 隔 6~9 题再现。先练最不熟的。</div>
    <div id="pbody"></div>
  </div>
  <div class="sheet" id="sheet">
    <h3>答题卡</h3>
    <div class="legend"><b style="background:#d9f4e8"></b>答对 <b style="background:#fbd9d2"></b>答错 <b style="background:#efece7"></b>未做　·　右上红点＝错题<span style="float:right" class="reset doReset">清除进度</span></div>
    <div class="grid" id="grid"></div>
  </div>
  <div class="foot">数据保存在本机浏览器 · 共 <span id="total"></span> 题 · 双击文件即可离线使用<br><span class="reset doReset" style="margin-top:4px;display:inline-block">清除全部进度</span></div>
</div>
<script>

, "multi": 0, "shuf": 0, "ans": []}, {"id": 780, "type": "大题", "q": "1939 年12 月，毛泽东在《中国革命与中国共产党》一文中指出：“认清中国社会的性质，就是说，认清中国的国情，乃是认清一切革命问题的基本的根据”。请详细说明新民主主义革命理论形成的依据。（共20 分，观点正确；论证充分；逻辑严密；条理清晰；400 字以上）", "opts": [], "multi": 0, "shuf": 0, "ans": ["一、近代中国国情和中国革命的时代特征。半殖民地半封建的社会性质是近代中国最基本的国情。半殖民地半封建社会，既不同于封建社会，也有别于资本主义社会，蕴含着特殊的社会矛盾和革命要求。一方面，帝国主义的侵略虽然在一定程度上促使封建社会自给自足的自然经济解体，在客观上为中国资本主义的发展创造了一定条件，但中国不可能发展成为资本主义国家。另一方面，帝国主义列强通过政治的、经济的和文化的侵略，使中国半殖民地化。近代中国的社会性质和主要矛盾，决定了中国革命仍然是资产阶级民主革命。但中国资产阶级民主革命不同于一般的资产阶级民主革命，经历了从旧民主主义革命向新民主主义革命的转变，具有鲜明的时代特征。", "二、新民主主义革命理论不是凭空产生的，而是适应新民主主义革命实践的需要，在认真总结中国革命经验教训的基础上形成的。这方面包括两点：1.旧民主主义革命的失败呼唤新的革命理论；2.新民主主义革命的艰辛探索奠定了革命理论形成的实践基础。"]}, {"id": 781, "type": "大题", "q": "邓小平指出：“毛泽东思想不是在个别的方面，而是在许多领域发展了马克思列宁主义。毛泽东思想是个体系，是发展了的马克思主义”。请据此简要阐述毛泽东思想的主要内容及其活的灵魂。（共20 分，观点正确；论证充分；逻辑严密；条理清晰；400 字以上）", "opts": [], "multi": 0, "shuf": 0, "ans": ["毛泽东思想的主要内容包括：1.新民主主义革命理论；2.社会主义革命和社会主义建设理论；3.革命军队建设和军事战略的理论；4.政策和策略的理论；5.思想政治工作和文化工作的理论；6.党的建设理论。除了上述几个方面外，毛泽东思想中还有关于国际战略和外交工作的理论等内容，都是党的宝贵精神财富。贯穿上述六个方面理论观点的红线就是毛泽东思想的灵魂，它有三个方面：实事求是、群众路线和独立自主。实事求是是马克思主义的根本观点，是毛泽东思想的精髓。实事求是，就是一切从实际出发，理论联系实际，坚持在实践中检验真理和发展真理。群众路线是我们党的生命线和根本工作路线。群众路线，就是一切为了群众，一切依靠群众，从群众中来，到群众中去。独立自主是中国革命和建设的基本立足点。独立自主，就是把国家和民族发展的方针放在自己力量的基点上，坚持民族自尊心和自信心，坚定不移走自己的路。"]}, {"id": 782, "type": "大题", "q": "社会主义建设道路初步探索的重要理论成果和经验教训有哪些？（共20 分，观点正确；论证充分；逻辑严密；条理清晰；400 字以上）", "opts": [], "multi": 0, "shuf": 0, "ans": ["重要理论成果：第一，调动一切积极因素为社会主义事业服务；第二，正确认识和处理社会主义社会矛盾的思想；第三，走中国工业化道路的思想。经验教训：第一，必须把马克思主义与中国实际相结合，探索符合中国特点的社会主义建设道路。第二，必须正确认识社会主义社会的主要矛盾和根本任务，集中力量发展生产力。第三，必须从实际出发进行社会主义建设，建设规模和速度要和国力相适应，不能急于求成。第四，必须发展社会主义民主，健全社会主义法制。第五，必须坚持党的民主集中制和集体领导制度，加强执政党建设。第六，必须坚持对外开放，借鉴和吸收人类文明成果建设社会主义，不能关起门来搞建设。"]}, {"id": 783, "type": "大题", "q": "邓小平谈到我国社会主义建设的经验时指出：“不要离开现实和超越阶段采取一些‘左’的办法，这样是搞不成社会主义的”，请结合这句话详细论述你对社会主义初级阶段理论的认识。（共20 分，观点正确；论证充分；逻辑严密；条理清晰；400 字以上）", "opts": [], "multi": 0, "shuf": 0, "ans": ["1. 我国处在社会主义初级阶段，是邓小平和我们党对当代中国基本国情的科学判断。我们讲解放思想、实事求是，从实际出发建设社会主义，最大的“实际”就是中国的基本国情。", "2. 党的十三大系统地论述了社会主义初级阶段理论。明确指出，社会主义初级阶段，就是指我国在生产力落后、商品经济不发达条件下建设社会主义必然要经历的特定阶段，即从我国进入社会主义到基本实现社会主义现代化的整个历史阶段。", "3. 邓小平关于社会主义初级阶段的论断，使我们对社会主义建设的长期性、复杂性、艰巨性有了更加清醒的认识。社会主义初级阶段理论基于对中国国情的准确把握，揭示了当代中国的历史方位，是建设中国特色社会主义的总依据，是对马克思主义关于社会主义发展阶段理论的重大发展和重大突破。", "4. 结合实际谈自己上述内容的个人见解，要求独立思考。"]}, {"id": 784, "type": "大题", "q": "以江泽民同志为主要代表的中国共产党人，在国内外形势十分复杂、世界社会主义出现严重曲折的严峻考验面前，捍卫了中国特色社会主义，形成了“三个代表”重要思想，成功把中国特色社会主义推向21 世纪。请详细论述“三个代表”重要思想的核心观点。（共20 分，观点正确；论证充分；逻辑严密；条理清晰；400 字以上）", "opts": [], "multi": 0, "shuf": 0, "ans": ["“中国共产党必须始终代表中国先进生产力的发展要求，代表中国先进文化的前进方向，代表中国最广大人民的根本利益。”这是对“三个代表”重要思想的集中概括。", "1. 始终代表中国先进生产力的发展要求，就是党的理论、路线、纲领、方针、政策和各项工作，必须努力符合生产力发展的规律，体现不断推动社会生产力的解放和发展的要求，尤其要体现推动先进生产力发展的要求，通过发展生产力不断提高人民群众的生活水平。", "2. 始终代表中国先进文化的前进方向，就是党的理论、路线、纲领、方针、政策和各项工作，必须努力体现发展面向现代化、面向世界、面向未来的，民族的科学的大众的社会主义文化的要求，促进全民族思想道德素质和科学文化素质的不断提高，为我国经济发展和社会进步提供精神动力和智力支持。", "3. 始终代表中国最广大人民的根本利益，就是党的理论、路线、纲领、方针、政策和各项工作，必须坚持把人民的根本利益作为出发点和归宿，充分发挥人民群众的积极性主动性创造性，在社会不断发展进步的基础上，使人民群众不断获得切实的经济、政治、文化利益。"]}, {"id": 785, "type": "大题", "q": "2003 年8 月底9 月初，胡锦涛在江西考察时，明确使用了“科学发展观”这个概念，提出要牢固树立协调发展、全面发展、可持续发展的科学发展观。科学发展观的科学内涵是什么？又是如何指导我国经济社会发展实践的？（共20 分，观点正确；论证充分；逻辑严密；条理清晰；400 字以上）", "opts": [], "multi": 0, "shuf": 0, "ans": ["科学发展观的科学内涵：第一要义是发展，核心是以人为本，基本要求是全面、协调、可持续，根本方法是统筹兼顾。科学发展观要求正确处理经济发展与社会发展、发展速度与效益、市场机制与宏观调控、改革发展稳定等社会主义现代化建设中的一系列重大关系，在大力推进经济建设的同时促进政治、文化、社会共同发展，解决好与经济增长相关的各种社会问题。科学发展观提出统筹兼顾的根本要求，把发展看作是相互推进、系统协调的过程，强调总揽全局，科学筹划，协调发展，兼顾各方，使各个方面、各个环节协调一致地运转。科学发展观着眼于中华民族的长远利益，以前瞻的眼光创新发展模式、健全发展机制、提高发展质量，努力实现经济与社会、人与自然的良性互动。科学发展观坚持正确处理中心与全面、重点与非重点、平衡与不平衡的关系，注重加强经济社会发展的薄弱环节，实现发展的均衡和协调。"]}, {"id": 786, "type": "单选", "q": "毛泽东思想形成和发展的实践基础是（）。", "opts": [{"t": "中国共产党领导人民进行的革命和建设的成功实践", "c": 1}, {"t": "中国共产党领导的农民起义", "c": 0}, {"t": "中国共产党领导的罢工运动", "c": 0}, {"t": "中国共产党领导的学生运动", "c": 0}], "multi": 0, "shuf": 1, "ans": []}, {"id": 787, "type": "单选", "q": "“三个代表”重要思想在邓小平理论的基础上，进一步回答了什么是社会主义、怎样建设社会主义的问题，创造性地回答了（）的问题，进一步深化了对中国特色社会主义的认识。", "opts": [{"t": "建设什么样的党、怎样建设党", "c": 1}, {"t": "实现什么样的发展、怎样发展", "c": 0}, {"t": "新时代坚持和发展什么样的中国特色社会主义、怎样坚持和发展中国特色社会主义", "c": 0}, {"t": "如何进行社会主义革命", "c": 0}], "multi": 0, "shuf": 1, "ans": []}, {"id": 788, "type": "单选", "q": "马克思、恩格斯曾设想用暴力没收与和平赎买这两种方式来变革所有制，并认为如果能用赎买的办法变革所有制，将是“最便宜不过了”。在我国推进资本主义工商业进行社会主义改造的过程中，使企业初步具有社会主义因素的是（）。", "opts": [{"t": "个别企业的公私合营", "c": 0}, {"t": "供销合作社", "c": 0}, {"t": "初级形式的国家资本主义", "c": 1}, {"t": "全行业的公私合营", "c": 0}], "multi": 0, "shuf": 1, "ans": []}, {"id": 789, "type": "单选", "q": "习近平同志指出：“毛泽东同志毕生最伟大的贡献，就是领导我们党和人民找到了新民主主义革命的正确道路，完成了反帝反封建的任务，建立了中华人民共和国，确立了社会主义基本制度，取得了社会主义建设的基础性成就，并为我们探索建设中国特色社会主义的道路积累了经验和提供了条件。”中国历史上最深刻最伟大的社会变革是（）。", "opts": [{"t": "结束了半殖民地半封建的历史", "c": 0}, {"t": "确立了社会主义基本制度", "c": 1}, {"t": "召开了中共十一届三中全会", "c": 0}, {"t": "完成了土地革命", "c": 0}], "multi": 0, "shuf": 1, "ans": []}, {"id": 790, "type": "单选", "q": "在社会主义改造时期，朱德及时指出，手工业要发展，必须响应党中央的号召，走组织起来的道路。关于个体手工业经济，下列说法中错误的是（）。", "opts": [{"t": "经营分散", "c": 0}, {"t": "建立在生产资料私有制和个体劳动基础上", "c": 0}, {"t": "规模狭小", "c": 0}, {"t": "技术先进", "c": 1}], "multi": 0, "shuf": 1, "ans": []}, {"id": 791, "type": "单选", "q": "“什么是社会主义，怎样建设社会主义”是邓小平在领导改革开放和现代化建设过程中不断提出和反复思考的首要的基本的理论问题，搞清这一基本理论问题，关键是要（）。", "opts": [{"t": "廓清不合乎时代进步和社会发展规律的模糊观念", "c": 0}, {"t": "在坚持社会主义基本制度基础上进一步认识社会主义本质", "c": 1}, {"t": "科学分析我国社会主要矛盾", "c": 0}, {"t": "系统总结社会主义社会发展的经验", "c": 0}], "multi": 0, "shuf": 1, "ans": []}, {"id": 792, "type": "多选", "q": "在党的七届二中全会上，毛泽东将“国家和私人合作的国家资本主义经济”作为新中国的几种主要的经济成分之一。在新中国社会主义改造过程中，中国共产党采用国家资本主义的方式开展对资本主义工商业的社会主义改造，即通过在一定的时期内有步骤地、有区别地把一切对国计民生有利的、而又为国家所需要的资本主义企业基本上改造为国家资本主义企业，并有计划地稳步地使低级形式的国家资本主义向高级形式的国家资本主义发展。国家资本主义（）。", "opts": [{"t": "不是一种独立的经济形态", "c": 1}, {"t": "其性质取决于生产力的发展水平", "c": 0}, {"t": "是与社会主义直接相联系的、国家直接控制和支配下的资本主义经济", "c": 1}, {"t": "是私人资本主义经济向社会主义国营经济过渡的形式", "c": 1}], "multi": 1, "shuf": 1, "ans": []}, {"id": 793, "type": "多选", "q": "马克思主义是我们立党立国、兴党兴国的根本指导思想。实践告诉我们，中国共产党为什么能，中国特色社会主义为什么好，归根到底是因为马克思主义行，是中国化时代化的马克思主义行。马克思主义中国化时代化，就是（）。", "opts": [{"t": "科学回答时代提出的重大理论和实践课题，创造新的理论成果", "c": 1}, {"t": "坚持把马克思主义基本原理同中国具体实际相结合、同中华优秀传统文化相结合", "c": 1}, {"t": "深入研究和解决中国革命、建设、改革不同历史时期的实际问题", "c": 1}, {"t": "立足中国国情和时代特点", "c": 1}], "multi": 1, "shuf": 1, "ans": []}, {"id": 794, "type": "多选", "q": "推进产业结构调整是经济结构调整的主要内容，必须坚持走中国特色新型工业化道路，发展（）的现代产业体系。", "opts": [{"t": "结构优化", "c": 1}, {"t": "向外为主", "c": 0}, {"t": "清洁安全", "c": 1}, {"t": "技术先进", "c": 1}], "multi": 1, "shuf": 1, "ans": []}, {"id": 795, "type": "多选", "q": "党的十七届五中全会强调，在当代中国，坚持发展是硬道理的本质要求，就是坚持科学发展，更加注重（），促进社会公平正义。", "opts": [{"t": "保障和改善民生", "c": 1}, {"t": "统筹兼顾", "c": 1}, {"t": "全面协调可持续发展", "c": 1}, {"t": "以人为本", "c": 1}], "multi": 1, "shuf": 1, "ans": []}, {"id": 796, "type": "多选", "q": "建设社会主义政治文明涉及政治思想、政治制度、行政管理、法制建设等方面，是一个系统工程，最根本的就是要（）有机统一。", "opts": [{"t": "依法治国", "c": 1}, {"t": "人民当家作主", "c": 1}, {"t": "坚持党的领导", "c": 1}, {"t": "坚持文化强国", "c": 0}], "multi": 1, "shuf": 1, "ans": []}, {"id": 797, "type": "多选", "q": "从中华人民共和国成立到社会主义改造基本完成，是我国从新民主主义到社会主义过渡的时期。这一时期，与新民主主义时期三种不同性质的主要经济成分相联系，中国社会的阶级构成主要有（）。", "opts": [{"t": "民族资产阶级", "c": 1}, {"t": "工人阶级", "c": 1}, {"t": "农民阶级", "c": 1}, {"t": "其他小资产阶级", "c": 1}], "multi": 1, "shuf": 1, "ans": []}, {"id": 798, "type": "多选", "q": "遵义会议以后，直至抗日战争时期，毛泽东在理论上系统地总结了中国革命特别是全民族抗日战争以来的经验，写出一系列理论著作，对新民主主义革命理论作了系统的阐述，实现了马克思主义与中国革命实践相结合的历史性飞跃，标志着毛泽东思想得到多方面展开而趋于成熟。在这些著作中，毛泽东运用马克思主义的认识论和辩证法（）。", "opts": [{"t": "提出了新民主主义革命的总路线，并制定了相应的经济、政治、文化纲领，指明了新民主主义革命的具体目标", "c": 1}, {"t": "详细论述了统一战线、武装斗争和党的建设的基本规律和内在联系，为新民主主义革命的胜利找到了正确方法", "c": 1}, {"t": "系统分析了党内“左”的和右的错误的思想根源", "c": 1}, {"t": "科学阐述了新民主主义革命的对象、动力、领导力量、性质和前途等基本问题", "c": 1}], "multi": 1, "shuf": 1, "ans": []}, {"id": 799, "type": "判断", "q": "科学发展观是全面建设小康社会、加快推进社会主义现代化的根本指针。", "opts": [{"t": "对", "c": 1}, {"t": "错", "c": 0}], "multi": 0, "shuf": 0, "ans": []}, {"id": 800, "type": "判断", "q": "民主集中制是无产阶级政党的根本组织原则，是指导党内生活的基本准则。", "opts": [{"t": "对", "c": 1}, {"t": "错", "c": 0}], "multi": 0, "shuf": 0, "ans": []}, {"id": 801, "type": "判断", "q": "只有紧紧抓住和搞好发展，才能从根本上把握人民的愿望，把握社会主义现代化建设的本质，把握我们党执政兴国的关键。", "opts": [{"t": "对", "c": 1}, {"t": "错", "c": 0}], "multi": 0, "shuf": 0, "ans": []}, {"id": 802, "type": "判断", "q": "坚持党对军队的绝对领导，是建设新型人民 function isObj(q){return q.type!=='大题';}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pass(id){return (state.level[id]||0)>=2;}
function filtered(){return DATA.filter(q=>(filterType==="全部"||q.type===filterType)&&(!filterWrong||state.wrong[q.id])).map(q=>q.id);}
function buildQueue(){
  // 先练最不熟：等级低的在前，同级随机
  pqueue=filtered().filter(id=>!pass(id));
  pqueue=shuffle(pqueue).sort((a,b)=>(state.level[a]||0)-(state.level[b]||0));
}
function curId(){return state.mode==="练习"?pqueue[0]:view[idx];}
function makeOpts(q){let o=q.opts.map((x,i)=>({t:x.t,c:x.c,oi:i}));if(q.shuf)shuffle(o);return o;}

function resetQ(){sel=[];checked=false;lastCorrect=false;
  document.getElementById("fb").className="fb";document.getElementById("ansbox").className="ansbox";
  document.getElementById("rate").innerHTML="";}

function renderOpts(q){
  const box=document.getElementById("opts");
  if(!isObj(q)){box.innerHTML="";box.style.display="none";return;}
  box.style.display="flex";box.innerHTML="";
  curOpts.forEach((o,i)=>{const d=document.createElement("div");d.className="opt";
    d.innerHTML=`<span class="lt">${"ABCD"[i]}</span><span>${esc(o.t)}</span>`;
    if(sel.includes(i))d.classList.add("sel");
    if(checked){d.classList.add("dis");
      if(o.c)d.classList.add("right");
      else if(sel.includes(i))d.classList.add("wrong");}
    else d.onclick=()=>toggle(q,i);
    box.appendChild(d);});
}
function toggle(q,i){if(checked)return;
  if(q.multi){const k=sel.indexOf(i);if(k<0)sel.push(i);else sel.splice(k,1);}else sel=[i];
  renderOpts(q);refreshBtns(q);}

function refreshBtns(q){const b=document.getElementById("btns");const practice=state.mode==="练习";
  if(isObj(q)){
    if(!checked){b.innerHTML=`<button class="primary" id="subBtn" ${sel.length?'':'disabled'}>提交${q.multi?'（多选）':''}</button>`;
      const s=document.getElementById("subBtn");if(s)s.onclick=()=>submitObj(q);}
    else{b.innerHTML=practice?`<button class="primary" id="nextP">下一题 →</button>`
                              :`<button class="ghost" id="reBtn">重做本题</button>`;
      const np=document.getElementById("nextP");if(np)np.onclick=()=>advance(lastCorrect);
      const rb=document.getElementById("reBtn");if(rb)rb.onclick=()=>{curOpts=makeOpts(q);resetQ();render();};}
  }else{
    b.innerHTML=`<button class="primary" id="showBtn">查看参考答案</button><button class="ghost" id="clrBtn">清空</button>`;
    document.getElementById("showBtn").onclick=()=>{document.getElementById("ansbox").classList.add("show");
      if(practice){document.getElementById("rate").innerHTML=`<button class="r0" id="kBtn">✅ 答对了</button><button class="r2" id="nBtn">❌ 没答对</button>`;
        document.getElementById("kBtn").onclick=()=>advance(true);document.getElementById("nBtn").onclick=()=>advance(false);}};
    document.getElementById("clrBtn").onclick=()=>{const id=curId();state.answers[id]="";document.getElementById("ta").value="";save();};
  }
}
function submitObj(q){checked=true;
  const need=curOpts.filter(o=>o.c).length,gotR=sel.filter(i=>curOpts[i].c).length,gotW=sel.filter(i=>!curOpts[i].c).length;
  lastCorrect=(gotW===0&&gotR===need);
  state.stat.n++;if(lastCorrect)state.stat.ok++;
  const fb=document.getElementById("fb");fb.className="fb show "+(lastCorrect?"ok":"bad");
  const ca=curOpts.map((o,i)=>o.c?"ABCD"[i]:"").filter(Boolean).join("");
  fb.textContent=lastCorrect?"✅ 回答正确":("❌ 回答错误　正确答案："+ca);
  renderOpts(q);
  if(state.mode==="浏览"){state.seen[q.id]=lastCorrect?"0":"2";if(!lastCorrect)state.wrong[q.id]=1;}
  if(q.ans&&q.ans.length)document.getElementById("ansbox").classList.add("show");
  save();refreshBtns(q);buildGrid();updateProg();
}
function advance(known){const id=curId();
  if(state.mode==="练习"){
    if(known)state.level[id]=(state.level[id]||0)+1;
    else{state.level[id]=0;state.wrong[id]=1;}
    pqueue.shift();
    if(!pass(id)){const gap=known?(6+Math.floor(Math.random()*4)):(2+Math.floor(Math.random()*2));
      pqueue.splice(Math.min(gap,pqueue.length),0,id);}
    save();resetQ();render();window.scrollTo({top:0,behavior:"smooth"});
  }
}
function setHead(q,label){
  const lv=state.level[q.id]||0,lvtxt=isObj(q)?`<span class="lv">${pass(q.id)?'已掌握':'熟练度 '+lv+'/2'}</span>`:'';
  const w=state.wrong[q.id]?'<span class="lv" style="background:#fdecea;color:#c0392b">错题</span>':'';
  document.getElementById("qhead").innerHTML=`<span class="qno">${label}</span><span class="tag t-${q.type}">${typeName(q.type)}</span>`+
    (q.multi?'<span class="hint">多选</span>':'')+lvtxt+w+`<span class="chaplbl"></span>`;
  document.getElementById("qtext").textContent=q.q;}
function updateProg(){const acc=state.stat.n?Math.round(state.stat.ok/state.stat.n*100):0;
  const wn=Object.keys(state.wrong).filter(id=>state.wrong[id]).length;
  if(state.mode==="练习"){const ft=filtered().length,mas=filtered().filter(id=>pass(id)).length;
    document.getElementById("prog").innerHTML=`掌握 ${mas}/${ft}<br>正确率 ${acc}% · 错题 ${wn}`;
    document.getElementById("barfill").style.width=(ft?mas/ft*100:0)+"%";}
  else{const done=Object.keys(state.seen).length;
    document.getElementById("prog").innerHTML=`已答 ${done}/${DATA.length}<br>正确率 ${acc}% · 错题 ${wn}`;
    document.getElementById("barfill").style.width=(done/DATA.length*100)+"%";}
}
function render(){
  document.getElementById("total").textContent=DATA.length;
  const practice=state.mode==="练习";
  document.getElementById("nav").style.display=practice?"none":"flex";
  document.getElementById("sheet").style.display=practice?"none":"block";
  document.getElementById("psheet").style.display=practice?"block":"none";
  document.getElementById("pstat").style.display=practice?"block":"none";
  document.querySelectorAll("#modesw .mchip").forEach(c=>c.classList.toggle("on",c.dataset.m===state.mode));
  if(practice)renderPractice();else renderBrowse();
  updateProg();
}
function setupQuestion(q){
  resetQ();curOpts=makeOpts(q);
  const ta=document.getElementById("ta");
  if(isObj(q))ta.style.display="none";else{ta.style.display="";ta.value=state.answers[q.id]||"";}
  document.getElementById("ansbody").innerHTML=(q.ans||[]).map(p=>`<p>${esc(p)}</p>`).join("");
  renderOpts(q);refreshBtns(q);
  document.getElementById("kbd").textContent=isObj(q)?"键盘：1-4 / A-D 选择，Enter 提交/下一题":"";
}
function renderPractice(){
  const ft=filtered().length,mas=filtered().filter(id=>pass(id)).length;
  if(pqueue.length===0){
    document.getElementById("qhead").innerHTML="";document.getElementById("opts").innerHTML="";
    document.getElementById("ta").style.display="none";document.getElementById("btns").innerHTML="";
    document.getElementById("fb").className="fb";document.getElementById("ansbox").className="ansbox";
    document.getElementById("kbd").textContent="";
    document.getElementById("pstat").innerHTML=`🎉 当前范围已全部掌握（${mas}/${ft}）`;
    document.getElementById("qtext").innerHTML=`<div class="done-card"><div class="big">🎉</div><h2>全部掌握！</h2><div style="color:#888;font-size:14px">当前筛选共 ${ft} 题，已全部连续答对 2 次。</div><button class="primary" id="againBtn" style="margin-top:18px;max-width:220px">🔄 再练一轮（重置熟练度）</button></div>`;
    const ab=document.getElementById("againBtn");if(ab)ab.onclick=()=>{filtered().forEach(id=>state.level[id]=0);save();buildQueue();render();};
    document.getElementById("pbody").innerHTML='<span style="color:#999;font-size:12px">队列已清空</span>';return;
  }
  const id=pqueue[0],q=DATA[id],lv=state.level[id]||0;
  const hint=lv===1?'　<b>✦ 已答对 1 次，再答对 1 次即掌握</b>':'';
  document.getElementById("pstat").innerHTML=`剩余队列 <b>${pqueue.length}</b> 题 · 已掌握 ${mas}/${ft}${hint}`;
  setHead(q,"刷题中");setupQuestion(q);buildPSheet();
}
function buildPSheet(){const up=pqueue.slice(0,16).map((id,i)=>{const q=DATA[id],lv=state.level[id]||0;
  return `<span class="qchip ${i===0?'cur':''} ${lv===1?'lv1':''}">${i+1}·${q.type}${state.wrong[id]?'🔁':''}${lv===1?'✦':''}</span>`;}).join("");
  const more=pqueue.length>16?`<span class="qchip">…+${pqueue.length-16}</span>`:"";
  document.getElementById("pbody").innerHTML=`<div class="qchips">${up}${more}</div>`;}
function renderBrowse(){
  view=filtered();if(idx>=view.length)idx=0;
  if(view.length===0){document.getElementById("qtext").textContent="（当前筛选无题目）";
    document.getElementById("opts").innerHTML="";document.getElementById("btns").innerHTML="";
    document.getElementById("qhead").innerHTML="";document.getElementById("grid").innerHTML="";return;}
  const q=DATA[view[idx]];setHead(q,`第 ${idx+1}/${view.length} 题`);setupQuestion(q);
  document.getElementById("prevBtn").disabled=idx===0;document.getElementById("nextBtn").disabled=idx===view.length-1;
  buildGrid();
}
function buildGrid(){if(state.mode!=="浏览")return;const g=document.getElementById("grid");g.innerHTML="";
  view.forEach((qid,i)=>{const r=state.seen[qid];const c=document.createElement("div");
    c.className="cell"+(i===idx?" cur":"")+(r!=null?" s"+r:"");c.textContent=i+1;
    if(state.wrong[qid])c.innerHTML+='<span class="dot"></span>';
    c.onclick=()=>{idx=i;render();window.scrollTo({top:0,behavior:"smooth"});};g.appendChild(c);});}
document.getElementById("ta").addEventListener("input",e=>{const id=curId();if(id!=null){state.answers[id]=e.target.value;save();}});
document.getElementById("prevBtn").onclick=()=>{if(idx>0){idx--;render();window.scrollTo({top:0,behavior:"smooth"});}};
document.getElementById("nextBtn").onclick=()=>{if(idx<view.length-1){idx++;render();window.scrollTo({top:0,behavior:"smooth"});}};
document.querySelectorAll("#modesw .mchip").forEach(c=>{c.onclick=()=>{state.mode=c.dataset.m;if(state.mode==="练习")buildQueue();idx=0;save();render();};});
document.querySelectorAll("#typefil .chip").forEach(c=>{c.onclick=()=>{
  if(c.dataset.k){filterWrong=!filterWrong;c.classList.toggle("on",filterWrong);}
  else{filterType=c.dataset.f;document.querySelectorAll("#typefil .chip[data-f]").forEach(x=>x.classList.remove("on"));c.classList.add("on");}
  idx=0;if(state.mode==="练习")buildQueue();render();};});
document.querySelectorAll(".doReset").forEach(b=>b.onclick=()=>{if(confirm("确定清除所有作答、熟练度、错题本与统计？")){state={answers:{},level:{},seen:{},wrong:{},mode:state.mode,stat:{n:0,ok:0}};save();buildQueue();render();}});
document.addEventListener("keydown",e=>{const q=DATA[curId()];if(!q)return;
  if(e.key==="Enter"){const sb=document.getElementById("subBtn"),np=document.getElementById("nextP");
    if(sb&&!sb.disabled){sb.click();e.preventDefault();}else if(np){np.click();e.preventDefault();}return;}
  if(isObj(q)&&!checked){let i=-1;const k=e.key.toUpperCase();
    if(k>="1"&&k<="4")i=+k-1;else if(k>="A"&&k<="D")i="ABCD".indexOf(k);
    if(i>=0&&i<curOpts.length){toggle(q,i);e.preventDefault();}}});
// ===== 导出 Word（纯浏览器，HTML->.doc，带进度界面）=====
function escD(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function ansLetters(q){return q.opts.map((o,i)=>o.c?"ABCD"[i]:"").filter(Boolean).join("");}
function ansJudge(q){const o=q.opts.find(x=>x.c);return o?o.t:"";}
const DOC_HEAD="<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'>"+
 "<style>body{font-family:'宋体',SimSun;font-size:11pt;line-height:1.5}h1{font-family:'微软雅黑';font-size:15pt;color:#A61B1B;margin:14pt 0 6pt}"+
 ".t{font-family:'微软雅黑';font-size:20pt;font-weight:bold;text-align:center;color:#111}"+
 ".note{font-size:9pt;color:#777;text-align:center;margin-bottom:8pt}"+
 ".q{font-weight:bold;margin:8pt 0 2pt}.o{margin:0 0 0 22pt}.a{color:#C00000;font-weight:bold;margin:2pt 0}.e{color:#1A551A;margin:2pt 0}</style></head><body>";
function showOv(){document.getElementById("ovicon").textContent="📄";document.getElementById("ovtitle").textContent="正在生成 Word…";
  document.getElementById("ov").classList.add("show");setOv(0,"准备中…");}
function setOv(p,sub){document.getElementById("ovfill").style.width=p+"%";document.getElementById("ovpct").textContent=p+"%";
  if(sub!=null)document.getElementById("ovsub").textContent=sub;}
function hideOv(){document.getElementById("ov").classList.remove("show");}
function renderDocItem(it){
  if(it.head)return "<h1>"+escD(it.head)+"</h1>";
  const q=it.q;let s="<p class=q>"+it.n+". "+escD(q.q)+"</p>";
  if(q.type==="大题"){(q.ans||[]).forEach((p,i)=>{s+="<p class=e>"+(i===0?"参考答案：":"")+escD(p)+"</p>";});}
  else if(q.type==="判断"){s+="<p class=a>【答案】"+ansJudge(q)+"</p>";}
  else{q.opts.forEach((o,i)=>{s+="<p class=o>"+"ABCD"[i]+". "+escD(o.t)+"</p>";});s+="<p class=a>【答案】"+ansLetters(q)+"</p>";}
  return s;
}
function exportWord(){
  const order=["单选","多选","判断","大题"],names={单选:"单选题",多选:"多选题",判断:"判断题",大题:"论述大题"},cn=["一","二","三","四"];
  const items=[];
  order.forEach((t,si)=>{const g=DATA.filter(q=>q.type===t);
    if(g.length){items.push({head:cn[si]+"、"+names[t]+"（共 "+g.length+" 题）"});g.forEach((q,n)=>items.push({q:q,n:n+1}));}});
  const total=items.length;let i=0;let html=DOC_HEAD+"<p class=t>毛概题库</p><p class=note>共 "+DATA.length+" 题 · 客观题含【答案】，论述题附参考要点</p>";
  showOv();
  function step(){
    const end=Math.min(i+30,total);
    for(;i<end;i++)html+=renderDocItem(items[i]);
    setOv(Math.round(i/total*100),"已处理 "+i+" / "+total+" 题");
    if(i<total){setTimeout(step,0);return;}
    html+="</body></html>";
    try{
      const blob=new Blob(["﻿"+html],{type:"application/msword"});
      const url=URL.createObjectURL(blob);const a=document.createElement("a");
      a.href=url;a.download="毛概题库_带答案.doc";document.body.appendChild(a);a.click();
      a.remove();setTimeout(()=>URL.revokeObjectURL(url),2000);
      setOv(100,"");document.getElementById("ovicon").textContent="✅";
      document.getElementById("ovtitle").textContent="导出完成";
      document.getElementById("ovsub").innerHTML='<span class="ovdone">已下载 毛概题库_带答案.doc，用 Word 打开即可</span>';
      setTimeout(hideOv,2200);
    }catch(e){document.getElementById("ovtitle").textContent="导出失败";document.getElementById("ovsub").textContent=String(e);setTimeout(hideOv,3000);}
  }
  setTimeout(step,60);
}
document.getElementById("expBtn").onclick=exportWord;
if(state.mode==="练习")buildQueue();render();
</script></body></html>
